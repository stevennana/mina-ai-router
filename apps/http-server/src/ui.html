<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mina Agent Router</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef1ed;
        --ink: #17201b;
        --muted: #64716a;
        --line: #c9d0c8;
        --panel: #fbfcf8;
        --panel-2: #f3f6ef;
        --router: #20372d;
        --router-ink: #f8fbf5;
        --ok: #14745d;
        --warn: #b54708;
        --bad: #b42318;
        --unknown: #697386;
        --focus: #245bff;
        --shadow: 0 1rem 2.5rem rgba(24, 35, 28, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 12% 8%, rgba(32, 55, 45, 0.12), transparent 24rem),
          linear-gradient(135deg, rgba(255, 255, 255, 0.62), transparent 34rem),
          var(--bg);
        color: var(--ink);
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        min-height: 2.75rem;
        border: 1px solid var(--router);
        border-radius: 0.45rem;
        padding: 0.7rem 0.9rem;
        background: var(--router);
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: var(--panel);
        color: var(--ink);
        border-color: var(--line);
      }

      button.danger {
        background: #fff8f7;
        color: var(--bad);
        border-color: #e7b7b0;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 2.75rem;
        border: 1px solid var(--line);
        border-radius: 0.45rem;
        padding: 0.72rem;
        background: white;
        color: var(--ink);
      }

      textarea {
        min-height: 7.5rem;
        resize: vertical;
      }

      label {
        display: grid;
        gap: 0.35rem;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .shell {
        width: min(100rem, calc(100% - 1.5rem));
        margin: 0 auto;
        padding: 1rem 0 2rem;
      }

      header {
        display: grid;
        gap: 0.9rem;
        padding: 0.6rem 0 1rem;
      }

      .topbar,
      .toolbar,
      .actions,
      .meta-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .topbar {
        justify-content: space-between;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.45rem;
        line-height: 1.12;
      }

      .subtitle {
        color: var(--muted);
        margin-top: 0.25rem;
        font-size: 0.95rem;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 2.25rem;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.35rem 0.65rem;
        background: rgba(255, 255, 255, 0.74);
        color: var(--muted);
        font-size: 0.82rem;
        overflow-wrap: anywhere;
      }

      .layout {
        display: grid;
        gap: 1rem;
      }

      .map-panel {
        background: rgba(251, 252, 248, 0.94);
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        box-shadow: var(--shadow);
      }

      .map-panel {
        min-height: calc(100vh - 12rem);
        overflow: hidden;
        position: relative;
      }

      .map-head,
      .side-head {
        min-height: 3.6rem;
        padding: 0.9rem 1rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .map {
        position: relative;
        min-height: 30rem;
        padding: 1rem;
      }

      .links {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .link-line {
        stroke: rgba(32, 55, 45, 0.32);
        stroke-width: 2;
        stroke-dasharray: 7 8;
      }

      .link-line.answered {
        stroke: rgba(20, 116, 93, 0.72);
        stroke-dasharray: 0;
      }

      .link-line.waiting {
        stroke: rgba(181, 71, 8, 0.82);
        stroke-width: 3;
        animation: flowPulse 1.4s ease-in-out infinite;
      }

      .link-line.failed,
      .link-line.timeout {
        stroke: rgba(180, 35, 24, 0.78);
        stroke-dasharray: 4 6;
      }

      .link-line.selected {
        stroke-width: 4;
      }

      .router-node,
      .agent-node {
        position: absolute;
        border-radius: 0.75rem;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 0.75rem 1.5rem rgba(24, 35, 28, 0.12);
      }

      .router-node {
        left: 50%;
        top: 50%;
        width: min(16rem, 64vw);
        min-height: 9.5rem;
        transform: translate(-50%, -50%);
        background: var(--router);
        color: var(--router-ink);
        padding: 1rem;
        display: grid;
        align-content: center;
        gap: 0.65rem;
        z-index: 3;
      }

      .router-node h2 {
        font-size: 1.1rem;
      }

      .router-node code {
        color: var(--router-ink);
        background: rgba(255, 255, 255, 0.12);
      }

      .agent-node {
        width: min(13.5rem, 42vw);
        min-height: 7.5rem;
        padding: 0.8rem;
        display: grid;
        gap: 0.45rem;
        cursor: pointer;
        text-align: left;
        color: var(--ink);
        z-index: 4;
        overflow: hidden;
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      }

      .agent-node:hover,
      .agent-node.selected {
        transform: translateY(-0.16rem);
        border-color: var(--focus);
        box-shadow: 0 1rem 2rem rgba(36, 91, 255, 0.14);
      }

      .agent-node.active-request {
        border-color: rgba(181, 71, 8, 0.62);
        box-shadow: 0 1rem 2rem rgba(181, 71, 8, 0.14);
      }

      .agent-node.failed-request {
        border-color: rgba(180, 35, 24, 0.55);
      }

      .agent-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .agent-id {
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .node-meta {
        color: var(--muted);
        font-size: 0.78rem;
        overflow-wrap: anywhere;
      }

      .request-summary {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }

      .legend {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.45rem;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .legend-dot {
        width: 0.75rem;
        height: 0.75rem;
        border-radius: 999px;
        background: var(--unknown);
      }

      .legend-dot.available,
      .legend-dot.answered {
        background: var(--ok);
      }

      .legend-dot.waiting {
        background: var(--warn);
      }

      .legend-dot.failed,
      .legend-dot.timeout,
      .legend-dot.missing {
        background: var(--bad);
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 1.75rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 0.15rem 0.5rem;
        font-size: 0.74rem;
        white-space: nowrap;
      }

      .status.available,
      .status.answered {
        color: var(--ok);
        border-color: rgba(20, 116, 93, 0.35);
        background: rgba(20, 116, 93, 0.08);
      }

      .status.waiting {
        color: var(--warn);
        border-color: rgba(181, 71, 8, 0.35);
        background: rgba(181, 71, 8, 0.08);
      }

      .status.busy {
        color: var(--warn);
        border-color: rgba(181, 71, 8, 0.42);
        background: rgba(181, 71, 8, 0.1);
      }

      .status.missing,
      .status.timeout,
      .status.failed {
        color: var(--bad);
        border-color: rgba(180, 35, 24, 0.35);
        background: rgba(180, 35, 24, 0.08);
      }

      .status.unknown {
        color: var(--unknown);
        background: rgba(105, 115, 134, 0.08);
      }

      .status.cancelled,
      .status.archived {
        color: var(--unknown);
        border-color: rgba(105, 115, 134, 0.3);
        background: rgba(105, 115, 134, 0.08);
      }

      .detail-grid,
      .form-grid {
        display: grid;
        gap: 0.75rem;
      }

      .kv {
        display: grid;
        gap: 0.3rem;
        min-width: 0;
      }

      .kv span {
        color: var(--muted);
        font-size: 0.78rem;
      }

      .kv strong,
      .kv code {
        overflow-wrap: anywhere;
      }

      code,
      pre {
        border-radius: 0.35rem;
        background: var(--panel-2);
      }

      code {
        padding: 0.12rem 0.28rem;
      }

      pre {
        margin: 0;
        max-height: 18rem;
        overflow: auto;
        padding: 0.75rem;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .empty {
        min-height: 12rem;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 0.5rem;
        padding: 1rem;
      }

      .request-list {
        display: grid;
        gap: 0.65rem;
      }

      .request-tools {
        display: grid;
        gap: 0.65rem;
      }

      .filter-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .filter-button {
        min-height: 2.25rem;
        background: white;
        color: var(--ink);
        border-color: var(--line);
        padding: 0.42rem 0.65rem;
      }

      .filter-button.selected {
        background: var(--router);
        border-color: var(--router);
        color: white;
      }

      .request-item {
        display: grid;
        gap: 0.4rem;
        padding: 0.75rem;
        border: 1px solid var(--line);
        border-radius: 0.45rem;
        background: white;
        color: var(--ink);
        cursor: pointer;
        text-align: left;
        width: 100%;
        min-height: 5.25rem;
      }

      .request-item:hover {
        border-color: var(--focus);
      }

      .request-item.selected {
        border-color: var(--focus);
        box-shadow: 0 0.75rem 1.5rem rgba(36, 91, 255, 0.12);
      }

      .request-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .muted {
        color: var(--muted);
      }

      .flow-detail {
        border-top: 1px solid var(--line);
        padding-top: 1rem;
        display: grid;
        gap: 0.75rem;
      }

      .notice {
        border: 1px solid var(--line);
        border-radius: 0.45rem;
        background: var(--panel-2);
        color: var(--muted);
        padding: 0.75rem;
        font-size: 0.86rem;
        line-height: 1.45;
      }

      .flow-path {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .context-menu {
        position: fixed;
        z-index: 20;
        width: min(18rem, calc(100vw - 2rem));
        padding: 0.45rem;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: rgba(251, 252, 248, 0.98);
        box-shadow: 0 1.25rem 3rem rgba(24, 35, 28, 0.18);
      }

      .context-menu button {
        width: 100%;
        justify-content: flex-start;
        background: transparent;
        border-color: transparent;
        color: var(--ink);
        text-align: left;
      }

      .context-menu button:hover {
        background: var(--panel-2);
        border-color: var(--line);
      }

      .context-menu .danger {
        color: var(--bad);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(23, 32, 27, 0.34);
      }

      .modal {
        width: min(46rem, 100%);
        max-height: min(44rem, calc(100vh - 2rem));
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid var(--line);
        border-radius: 0.6rem;
        background: var(--panel);
        box-shadow: 0 1.5rem 4rem rgba(24, 35, 28, 0.24);
        overflow: hidden;
      }

      .modal-head {
        min-height: 4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 1rem;
        border-bottom: 1px solid var(--line);
      }

      .modal-body {
        overflow: auto;
        padding: 1rem;
        display: grid;
        gap: 1rem;
      }

      .guide-steps {
        display: grid;
        gap: 0.75rem;
      }

      .guide-steps code {
        display: block;
        padding: 0.75rem;
        overflow-wrap: anywhere;
      }

      .directory-picker {
        grid-column: 1 / -1;
        display: grid;
        gap: 0.6rem;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: white;
        padding: 0.75rem;
      }

      .directory-list {
        display: grid;
        gap: 0.35rem;
        max-height: 15rem;
        overflow: auto;
      }

      .directory-row {
        min-height: 2.35rem;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        border-color: var(--line);
        background: var(--panel);
        color: var(--ink);
        text-align: left;
      }

      .terminal-panel {
        grid-column: 1 / -1;
        display: grid;
        gap: 0.65rem;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: #101612;
        color: #d8f5df;
        padding: 0.75rem;
      }

      .terminal-panel .terminal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .terminal-panel pre {
        min-height: 16rem;
        max-height: 24rem;
        background: #080d0a;
        color: #d8f5df;
        border: 1px solid rgba(216, 245, 223, 0.16);
      }

      .terminal-panel input {
        background: #080d0a;
        color: #d8f5df;
        border-color: rgba(216, 245, 223, 0.24);
      }

      @keyframes flowPulse {
        0%,
        100% {
          opacity: 0.45;
        }

        50% {
          opacity: 1;
        }
      }

      .hidden {
        display: none !important;
      }

      @media (min-width: 48rem) {
        h1 {
          font-size: 1.9rem;
        }

        .form-grid,
        .detail-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 47.99rem) {
        .map-panel {
          min-height: auto;
        }

        .map {
          min-height: auto;
          display: grid;
          gap: 0.75rem;
        }

        .links {
          display: none;
        }

        .router-node,
        .agent-node {
          position: static;
          transform: none;
          width: 100%;
        }

        .router-node {
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="topbar">
          <div>
            <h1>Mina Agent Router</h1>
            <p class="subtitle">Agent-to-agent flow map for visible CLI sessions</p>
          </div>
          <div class="toolbar">
            <button id="showConnectGuide" class="secondary">Connect Agent</button>
            <button id="showDevTools" class="secondary">Developer Tools</button>
            <button id="refresh" class="secondary">Refresh</button>
          </div>
        </div>
        <div class="meta-row">
          <span class="chip" id="mcp-url">Loading MCP URL...</span>
          <span class="chip" id="state-path">Loading state...</span>
          <span class="chip" id="health-summary">Health loading...</span>
          <button id="copyMcpCommand" class="secondary">Copy MCP Command</button>
        </div>
      </header>

      <main class="layout">
        <section class="map-panel">
          <div class="map-head">
            <div>
              <h2>Live Agent Flow</h2>
              <p class="subtitle">Click an agent for details, history, controls, or removal</p>
            </div>
            <span class="chip" id="agent-count">0 agents</span>
          </div>
          <div class="map" id="diagram">
            <svg class="links" id="links" aria-hidden="true"></svg>
            <div class="router-node" id="routerNode">
              <h2>MCP Router</h2>
              <div><code>/mcp</code></div>
              <div class="node-meta" id="routerSummary">Waiting for state...</div>
              <div class="legend">
                <span class="legend-dot answered"></span><span>answered</span>
                <span class="legend-dot waiting"></span><span>waiting</span>
                <span class="legend-dot failed"></span><span>failed</span>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="agentMenu" class="context-menu hidden"></div>
    <div id="flowMenu" class="context-menu hidden"></div>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
          <div>
            <h2 id="modalTitle">Details</h2>
            <p class="subtitle" id="modalSubtitle"></p>
          </div>
          <button id="closeModal" class="secondary" type="button">Close</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
      </section>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      let busy = false;
      let currentState = { agents: [], requests: [] };
      let selectedAgentId = "";
      let selectedRequestId = "";
      let lastAskOutput = "";
      let createTerminalTimer = 0;

      async function api(path, options = {}) {
        const res = await fetch(path, {
          ...options,
          headers: { "content-type": "application/json", ...(options.headers || {}) },
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || res.statusText);
        return json;
      }

      async function refresh() {
        currentState = await api("/api/state");
        refreshHealth().catch(() => undefined);
        render();
      }

      async function refreshHealth() {
        const health = await api("/api/health");
        $("health-summary").textContent = health.ok
          ? `${health.agents.available}/${health.agents.total} available, ${health.requests.open} open`
          : `${health.agents.missing} missing, ${health.requests.open} open`;
      }

      function render() {
        $("mcp-url").textContent = currentState.mcpUrl || "MCP URL unavailable";
        $("state-path").textContent = currentState.statePath || "state unavailable";
        $("agent-count").textContent = `${currentState.agents.length} agent${currentState.agents.length === 1 ? "" : "s"}`;
        $("routerSummary").textContent = `${answeredCount()} answered / ${waitingCount()} waiting`;
        renderDiagram(currentState.agents || []);
        if (!selectedAgent()) {
          hideAgentMenu();
        }
      }

      function renderDiagram(agents) {
        const diagram = $("diagram");
        diagram.querySelectorAll(".agent-node").forEach((node) => node.remove());
        const positions = layoutFor(agents.length);

        agents.forEach((agent, index) => {
          const node = document.createElement("button");
          node.type = "button";
          const latest = latestRequestFor(agent.id);
          node.dataset.agentId = agent.id;
          node.className = [
            "agent-node",
            selectedAgentId === agent.id ? "selected" : "",
            latest?.status === "waiting" ? "active-request" : "",
            ["failed", "timeout"].includes(latest?.status) ? "failed-request" : "",
          ].filter(Boolean).join(" ");
          node.style.left = positions[index].left;
          node.style.top = positions[index].top;
          node.innerHTML = `
            <div class="agent-title">
              <span class="agent-id">${escapeHtml(agent.id)}</span>
              <span class="status ${escapeAttr(agent.status)}">${escapeHtml(agent.status)}</span>
            </div>
            <div class="node-meta">${escapeHtml(agent.agentType)} / ${escapeHtml(agent.transport)}</div>
            <div class="node-meta">${escapeHtml(agent.sessionId || "-")}</div>
            <div class="node-meta request-summary">${escapeHtml(shortCapability(agent))}</div>
            <div class="node-meta request-summary">${escapeHtml(lastRequestLabel(agent, latest))}</div>
          `;
          node.onclick = (event) => {
            if (selectedAgentId !== agent.id) {
              lastAskOutput = "";
            }
            selectedAgentId = agent.id;
            selectedRequestId = latest?.id || "";
            render();
            showAgentMenu(agent, event.clientX, event.clientY);
          };
          diagram.appendChild(node);
        });

        requestAnimationFrame(drawLinks);
      }

      function layoutFor(count) {
        if (count <= 0) return [];
        const slots = [
          { left: "6%", top: "9%" },
          { left: "70%", top: "9%" },
          { left: "6%", top: "68%" },
          { left: "70%", top: "68%" },
          { left: "39%", top: "7%" },
          { left: "39%", top: "72%" },
          { left: "3%", top: "38%" },
          { left: "75%", top: "38%" },
        ];
        return Array.from({ length: count }, (_, index) => slots[index] || orbitPosition(index, count));
      }

      function orbitPosition(index, count) {
        const angle = (Math.PI * 2 * index) / Math.max(count, 1) - Math.PI / 2;
        const x = 42 + Math.cos(angle) * 35;
        const y = 42 + Math.sin(angle) * 31;
        return { left: `${Math.max(2, Math.min(78, x))}%`, top: `${Math.max(4, Math.min(76, y))}%` };
      }

      function drawLinks() {
        const svg = $("links");
        const map = $("diagram").getBoundingClientRect();
        const router = $("routerNode").getBoundingClientRect();
        const center = rectCenter(router, map);
        const nodes = Array.from(document.querySelectorAll(".agent-node"));
        svg.setAttribute("viewBox", `0 0 ${map.width} ${map.height}`);
        svg.innerHTML = nodes.map((node) => {
          const target = rectCenter(node.getBoundingClientRect(), map);
          const request = requestForLine(node.dataset.agentId || "");
          const selected = request?.id && request.id === selectedRequestId ? "selected" : "";
          const status = escapeAttr(request?.status || "");
          return `<line class="link-line ${status} ${selected}" x1="${center.x}" y1="${center.y}" x2="${target.x}" y2="${target.y}"></line>`;
        }).join("");
      }

      function rectCenter(rect, base) {
        return {
          x: rect.left - base.left + rect.width / 2,
          y: rect.top - base.top + rect.height / 2,
        };
      }

      function kv(label, value) {
        return `<div class="kv"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
      }

      function handleAgentAction(action, agentId) {
        const agent = currentState.agents.find((candidate) => candidate.id === agentId);
        if (!agent) return;
        selectedAgentId = agent.id;
        hideAgentMenu();
        if (action === "details") showAgentDetails(agent);
        if (action === "history") showAgentHistory(agent);
        if (action === "terminal") showAgentTerminal(agent);
        if (action === "ask") showAskAgent(agent);
        if (action === "attach") showAttachCommands(agent);
        if (action === "copy") copyAttach(agent);
        if (action === "restart") restartAgent(agent);
        if (action === "delete") deleteAgent(agent);
      }

      function showAgentDetails(agent) {
        showModal(agent.id, `${agent.agentType} / ${agent.transport}`, `
          <div class="detail-grid">
            <div class="notice" style="grid-column: 1 / -1">${escapeHtml(healthMessage(agent))}</div>
            ${kv("Status", agent.status)}
            ${kv("Session", agent.sessionId || "-")}
            ${kv("Project root", agent.projectRoot || "-")}
            ${kv("Capabilities", agent.capabilitySummary || "No capability notice registered yet.")}
            ${kv("Capability sources", agent.capabilitySources || "-")}
            ${kv("Detail", agent.detail || "-")}
            ${kv("Last request", agent.lastRequestStatus || "-")}
            ${kv("Attach command", attachCommand(agent))}
            ${kv("MAR attach command", marAttachCommand(agent))}
            ${kv("Open root", `cd ${agent.projectRoot || "."}`)}
          </div>
          <form id="capabilityForm" class="detail-grid" style="margin-top: 1rem">
            <label style="grid-column: 1 / -1">Capabilities<textarea id="editCapabilitySummary">${escapeHtml(agent.capabilitySummary || "")}</textarea></label>
            <label style="grid-column: 1 / -1">Capability sources<input id="editCapabilitySources" value="${escapeAttrValue(agent.capabilitySources || "")}" /></label>

      function showAgentHistory(agent) {
        const requests = agentRequests(agent.id).slice().reverse();

      function showRequestDetail(requestId) {
        const request = currentState.requests.find((candidate) => candidate.id === requestId);
        if (!request) return;
        showModal(request.id, `${displaySource(request.sourceAgent)} -> ${request.targetAgent}`, `

      function showAskAgent(agent) {

        $("askForm").onsubmit = (event) => withBusy(async () => {

      function requestCard(request) {
        return `
          <button type="button" class="request-item" data-request-id="${escapeAttr(request.id)}">

      function bindRequestActions() {
        $("modalBody").querySelectorAll("[data-request-action]").forEach((button) => {
          button.onclick = () => withBusy(async () => {
            const action = button.dataset.requestAction;
            const id = button.dataset.requestId;
            if (!action || !id) return;
            const original = currentState.requests.find((request) => request.id === id);
            if (action === "cancel" && !confirm(`Mark request "${id}" as cancelled?`)) return;
            if (action === "archive" && !confirm(`Archive request "${id}"?`)) return;
            const result = await api(`/api/requests/${encodeURIComponent(id)}/${action}`, { method: "POST" });
            currentState = result.state;
            if (action === "retry" && result.result?.requestId) {
              selectedRequestId = result.result.requestId;
              lastAskOutput = JSON.stringify(result.result, null, 2);
            }
            render();
            const targetId = result.result?.targetAgent || original?.targetAgent || selectedAgentId;
            const agent = currentState.agents.find((candidate) => candidate.id === targetId);
            if (agent) showAgentHistory(agent);
          });
        });
      }

      function terminalPanelHtml(prefix) {
        return `
          <div id="${prefix}TerminalPanel" class="terminal-panel">
            <div class="terminal-head">
              <div>
                <strong>Terminal preview</strong>
                <p class="subtitle" id="${prefix}TerminalStatus"></p>
              </div>
              <div class="actions">
                <button type="button" class="secondary" id="refresh${capitalize(prefix)}Terminal">Refresh</button>
                <button type="button" class="secondary" id="send${capitalize(prefix)}Enter">Send Enter</button>
              </div>
            </div>
            <pre id="${prefix}TerminalOutput"></pre>
            <div class="actions">
              <input id="${prefix}TerminalInput" placeholder="Type input for this tmux session" />
              <button type="button" id="send${capitalize(prefix)}Input">Send</button>
            </div>
          </div>
        `;
      }

      function startTerminalPanel(options) {
        stopCreateTerminal();
        $(options.panelId).classList.remove("hidden");
        $(options.statusId).textContent = options.idleStatus;
        $(options.refreshId).onclick = () => withBusy(async () => refreshTerminalPanel(options, false));
        $(options.enterId).onclick = () => withBusy(async () => sendTerminalPanelInput(options, "", true));
        $(options.sendId).onclick = () => withBusy(async () => {
          await submitTerminalInput(options);
        });
        $(options.inputId).onkeydown = (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            withBusy(async () => submitTerminalInput(options));
          }
        };
        refreshTerminalPanel(options, false).catch((error) => {
          $(options.outputId).textContent = error.message || String(error);
        });
        createTerminalTimer = window.setInterval(() => {
          refreshTerminalPanel(options, true).catch(() => undefined);
        }, 1800);
      }

      async function submitTerminalInput(options) {
        const value = $(options.inputId).value;
        $(options.inputId).value = "";
        await sendTerminalPanelInput(options, value, true);
      }

      function stopCreateTerminal() {
        if (createTerminalTimer) {
          window.clearInterval(createTerminalTimer);
          createTerminalTimer = 0;
        }
      }

      async function refreshTerminalPanel(options, allowAutoHide) {
        const result = await api(`/api/agents/${encodeURIComponent(options.agentId)}/terminal`);
        $(options.outputId).textContent = result.terminal.text || "";
        $(options.statusId).textContent = terminalStatusText(result, options.autoHideOnRegistered);
        const latest = (await api("/api/state")).agents.find((agent) => agent.id === options.agentId);
        if (latest) {
          currentState.agents = currentState.agents.map((agent) => agent.id === latest.id ? latest : agent);
        }
        if (allowAutoHide && options.autoHideOnRegistered && latest && !isPendingUiRegistration(latest)) {
          $(options.panelId).classList.add("hidden");
          stopCreateTerminal();
          if ($("createTmuxOutput")) {
            $("createTmuxOutput").textContent = `Agent "${options.agentId}" completed self-registration and is available.`;
          }
          render();
        }
      }

      async function sendTerminalPanelInput(options, text, enter) {
        const result = await api(`/api/agents/${encodeURIComponent(options.agentId)}/terminal/input`, {
          method: "POST",
          body: JSON.stringify({ text, enter }),
        });
        $(options.outputId).textContent = result.terminal.text || "";
        $(options.statusId).textContent = result.registration === "registration prompt sent to agent"
          ? "Trust approved. Mina sent the self-registration prompt."
          : terminalStatusText(result, options.autoHideOnRegistered);
      }

      function terminalStatusText(result, autoHideOnRegistered) {
        if (result.terminal.trustPrompt) {
          return "Codex is waiting for directory trust approval. Press Send Enter to continue.";
        }

        if (result.terminal.pendingRegistration) {
          return "Waiting for the agent to finish self-registration.";
        }

        return autoHideOnRegistered
          ? "Agent is registered. Terminal preview will close automatically."
          : "Live terminal preview is active.";
      }

      function capitalize(value) {
        return `${value.charAt(0).toUpperCase()}${value.slice(1)}`;
      }

      function isPendingUiRegistration(agent) {
        return agent.capabilitySummary === "Pending self-registration capability notice."
          && agent.capabilitySources === "created from Mina UI";
      }

        $("setupPair").onclick = () => withBusy(async () => {
          const result = await api("/api/setup-codex-pair", {
            method: "POST",
            body: JSON.stringify({
              helperRoot: "/Users/stevenna/PycharmProjects/mina-ralph-loop-bootstrap-nextjs",
              helperId: "ralph",
              sessionId: "mina-ralph-codex",

          selectedAgentId = result.helper.id;
          await refresh();
        });
        $("archiveStale").onclick = () => withBusy(async () => {
          if (!confirm("Archive stale created/sent/waiting requests older than 30 minutes?")) return;
          const result = await api("/api/requests/archive-stale", {
            method: "POST",
            body: JSON.stringify({ olderThanMs: 30 * 60 * 1000 }),
          });
          currentState = result.state;
          lastAskOutput = `Archived ${result.archived.length} stale request(s).`;
          render();
          showDeveloperTools();

          item.onclick = () => showRequestDetail(item.dataset.requestId || "");

      function copyAttach(agent) {
        withBusy(async () => {
          await copyText(attachCommand(agent));
          lastAskOutput = `Copied: ${attachCommand(agent)}`;
        });
      }

      function restartAgent(agent) {
        withBusy(async () => {
          if (agent.transport !== "tmux") {
            alert(`Agent "${agent.id}" does not use tmux.`);
            return;
          }
          if (!confirm(`Restart tmux session "${agent.sessionId}" for agent "${agent.id}"?`)) return;
          const result = await api(`/api/agents/${encodeURIComponent(agent.id)}/restart`, { method: "POST" });
          currentState = result.state;
          lastAskOutput = `Restarted tmux session: ${agent.sessionId}`;
          render();
        });
      }

      function deleteAgent(agent) {
        withBusy(async () => {
          if (!confirm(`Delete agent "${agent.id}" from the router registry?`)) return;
          const result = await api(`/api/agents/${encodeURIComponent(agent.id)}`, { method: "DELETE" });
          currentState = result.state;
          selectedAgentId = "";
          lastAskOutput = "";
          closeModal();
          render();
        });
      }

      async function withBusy(fn) {
        if (busy) return;
        busy = true;
        document.querySelectorAll("button").forEach((button) => button.disabled = true);
        try {
          await fn();
        } catch (error) {
          alert(error.message || String(error));
        } finally {
          busy = false;
          document.querySelectorAll("button").forEach((button) => button.disabled = false);
        }
      }

      $("refresh").onclick = () => withBusy(refresh);
      $("copyMcpCommand").onclick = () => withBusy(async () => {
        const command = `codex mcp add mina-agent-router --url ${currentState.mcpUrl}`;
        await copyText(command);
        lastAskOutput = `Copied: ${command}`;
        render();
      });
      $("showConnectGuide").onclick = showConnectGuide;
      $("showDevTools").onclick = showDeveloperTools;
      $("closeModal").onclick = closeModal;
      $("modalBackdrop").onclick = (event) => {
        if (event.target.id === "modalBackdrop") closeModal();
      };
      $("diagram").addEventListener("contextmenu", (event) => {
        if (event.target.closest(".agent-node")) {
          return;
        }
        event.preventDefault();
        hideAgentMenu();
        showFlowMenu(event.clientX, event.clientY);
      });
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".agent-node") && !event.target.closest("#agentMenu")) {
          hideAgentMenu();
        }
        if (!event.target.closest("#diagram") && !event.target.closest("#flowMenu")) {
          hideFlowMenu();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          hideAgentMenu();
          hideFlowMenu();
          closeModal();
        }
      });
      window.addEventListener("resize", drawLinks);
      setInterval(() => refresh().catch(() => undefined), 5000);

      function selectedAgent() {
        return currentState.agents.find((agent) => agent.id === selectedAgentId);
      }

      function selectedRequest() {
        return currentState.requests.find((request) => request.id === selectedRequestId);
      }

      function latestRequestFor(agentId) {
        return currentState.requests
          .slice()
          .reverse()
          .find((request) => request.targetAgent === agentId);
      }

      function agentRequests(agentId) {
        return currentState.requests.filter((request) => request.targetAgent === agentId || request.sourceAgent === agentId);
      }

      function displaySource(sourceAgent) {
        return !sourceAgent || sourceAgent === "main" ? "direct" : sourceAgent;
      }

      function requestForLine(agentId) {
        const selected = selectedRequest();
        if (selected?.targetAgent === agentId) {
          return selected;
        }

        return latestRequestFor(agentId);
      }

      function attachCommand(agent) {
        if (agent.transport !== "tmux") {
          return "not available for non-tmux agents";
        }

        return `tmux attach -t ${agent.sessionId}`;
      }

      function marAttachCommand(agent) {
        if (agent.transport !== "tmux") {
          return "not available for non-tmux agents";
        }

        return `mar attach ${agent.id}`;
      }

      function healthMessage(agent) {
        if (agent.status === "available") {
          return "Agent session is reachable. It can receive routed requests.";
        }

        if (agent.status === "missing") {
          return agent.detail || `tmux session "${agent.sessionId}" is missing. Restart the session or re-register the agent.`;
        }

        if (agent.status === "unknown") {
          return "This transport does not expose a live health check yet. Calls may still work if the transport is headless or mock.";
        }

        return "Agent status needs operator attention.";
      }

      async function copyText(value) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(value);
          return;
        }

        const input = document.createElement("textarea");
        input.value = value;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }

      function answeredCount() {
        return currentState.requests.filter((request) => request.status === "answered").length;
      }

      function waitingCount() {
        return currentState.requests.filter((request) => request.status === "waiting").length;
      }

      function lastRequestLabel(agent, latest) {
        if (latest) {
          return `${latest.status}: ${latest.task}`;
        }

        return agent.lastRequestStatus ? `last: ${agent.lastRequestStatus}` : "no recent request";
      }

      function shortCapability(agent) {
        const text = agent.capabilitySummary || "capability not registered";
        return text.length > 84 ? `${text.slice(0, 81)}...` : text;
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      function escapeAttr(value) {
        return String(value ?? "").replace(/[^a-zA-Z0-9_-]/g, "");
      }

      function escapeAttrValue(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      refresh();
    </script>
  </body>
</html>
